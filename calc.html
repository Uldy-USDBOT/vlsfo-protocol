<section id="vlsfo-calculator" style="max-width: 800px; margin: 40px auto; padding: 30px; background: #f4f7f6; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); font-family: 'Segoe UI', sans-serif; direction: ltr;">
    <h2 style="color: #2c3e50; text-align: center; margin-bottom: 25px;">🚢 VLSFO Consumption Calculator</h2>
    <p style="text-align: center; color: #7f8c8d; margin-bottom: 30px;">Estimate your vessel's daily fuel costs based on real-time market averages.</p>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
        <div>
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">Consumption (Metric Tons/Day)</label>
            <input type="number" id="consumption" placeholder="e.g. 25" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
        </div>
        <div>
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">Current VLSFO Price ($/MT)</label>
            <input type="number" id="price" placeholder="e.g. 650" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
        </div>
    </div>

    <button onclick="calculateFuel()" style="width: 100%; padding: 15px; background: #d4af37; color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s;">
        Calculate Daily Cost
    </button>

    <div id="result" style="margin-top: 25px; padding: 20px; background: #fff; border-radius: 10px; display: none; text-align: center; border: 1px dashed #d4af37;">
        <h3 style="margin: 0; color: #27ae60;">Estimated Daily Cost: <span id="total-cost">0</span> USD</h3>
        <p style="margin: 10px 0 0; font-size: 0.9rem; color: #95a5a6;">*Based on average engine efficiency metrics.</p>
    </div>
</section>

<script>
function calculateFuel() {
    const consumption = document.getElementById('consumption').value;
    const price = document.getElementById('price').value;
    const resultDiv = document.getElementById('result');
    
    if (consumption > 0 && price > 0) {
        const total = (consumption * price).toLocaleString();
        document.getElementById('total-cost').innerText = total;
        resultDiv.style.display = 'block';
    } else {
        alert("Please enter valid numbers for consumption and price.");
    }
}
</script>
